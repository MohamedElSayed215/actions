apiVersion: v1
kind: Service
metadata:
  name: nexus-crm-svc
  namespace: default
  labels:
    app: nexus-crm
spec:
  selector:
    app: nexus-crm
  type: ClusterIP        # Change to LoadBalancer or use Ingress for external access
  ports:
    - name:       http
      port:       80
      targetPort: 3001
      protocol:   TCP

---
# Optional: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexus-crm-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexus-crm
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
